<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>{{ isLoginMode ? "Вхід в акаунт" : "Створити профіль" }}</h2>
      <p>
        {{ isLoginMode ? "З поверненням!" : "Приєднуйтесь до нас сьогодні" }}
      </p>
    </div>
    <div *ngIf="user">Успішно зареєстровано!</div>
    <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
      <div class="form-group" *ngIf="!isLoginMode">
        <label>Ваше ім'я</label>
        <input
          type="text"
          formControlName="name"
          placeholder="Олександр"
          [class.error]="
            authForm.get('name')?.invalid && authForm.get('name')?.touched
          "
        />
      </div>

      <div class="form-group">
        <label>Електронна пошта</label>
        <input
          type="email"
          formControlName="email"
          placeholder="example@mail.com"
          [class.error]="
            authForm.get('email')?.invalid && authForm.get('email')?.touched
          "
        />
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••"
          [class.error]="
            authForm.get('password')?.invalid &&
            authForm.get('password')?.touched
          "
        />
      </div>

      <button type="submit" class="btn-submit">
        {{ isLoginMode ? "Увійти" : "Зареєструватися" }}
      </button>
    </form>

    <div class="auth-footer">
      <span>
        {{ isLoginMode ? "Немає акаунту?" : "Вже маєте акаунт?" }}
      </span>
      <button class="btn-toggle" (click)="toggleMode()">
        {{ isLoginMode ? "Створити" : "Увійти" }}
      </button>
    </div>
  </div>
</div>
